<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Movie streaming platform with top titles.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Platform</title>
  <link rel="stylesheet" href="style.css">
  <script src="product.js" defer></script>
</head>
<body class="page-content">
  <!-- Gradient Overlay -->
  <div class="gradient-overlay"></div>
  <div class="gradient-overlay-circular"></div>
  
  <!-- Header -->
  <header>
    <div class="logo">MyStream</div>
    <nav class="main-nav">
      <ul>
        <li><a href="website.html" class="nav-link">Home</a></li>
        <li><a href="Products.html" class="nav-link">Products</a></li>
        <li><a href="contact.html" class="nav-link">Contact Us</a></li>
      </ul>
    </nav>

    <div class="user-icon">
      <span>🔍</span>
      <input type="text" class="search-bar" placeholder="Search...">
    </div>
  </header>

  <h1 class="catalog-heading">Catalog</h1>
    <nav class="catalog-nav">
        <input type="text" id="filmName" class="search-bar" placeholder="Film name">
        <input type="date" id="dateSelector">
            <select id="category">
                <option value="">Category</option>
                <option value="movie">Movie</option>
                <option value="series">Series</option>
            </select>
            <select id="genre">
                <option value="">Genre</option>
                <option value="action">Action</option>
                <option value="drama">Drama</option>
                <option value="comedy">Comedy</option>
            </select>
            <select id="country">
                <option value="">Country</option>
                <option value="us">USA</option>
                <option value="ph">Philippines</option>
                <option value="jp">Japan</option>
            </select>
        <button id="searchBtn" disabled>🔍</button>
    </nav>
