<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>
<div class="logo">
    <img src="MyStreamLogo.png" alt="MyWebsite Logo">
</div>

  <div class="about">
    <h1>Unlimited movies, TV shows, and more </h1>
    <h2>Starts at ₱169. Purchase Anytime.</h2>
    <p>
      Welcome to MyStream! We bring you the latest movies, reviews, and rankings
      in a sleek interactive interface. Log in to explore our curated top 10 lists,
      trailers, and exclusive content.
    </p>
  </div>

  <div class="login-box">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <div class="buttonlist">
        <button type="submit" class="button">Login</button>
        <button type="button" class="button2">Cancel</button>
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (email && password) {
        window.location.href = "Homepage.html";
      } else {
        alert("Please fill in both email and password.");
      }
    });
  </script>
</body>
</html>
